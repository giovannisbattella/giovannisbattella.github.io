<ul class="post-list">
  {% for post in site.posts %}
    <li class="post-item">
      <h2 class="post-title">
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </h2>
      
      <p class="post-meta">
        <time datetime="{{ post.date | date_to_xmlschema }}">
          {{ post.date | date: "%B %-d, %Y" }}
        </time>
        {% if post.tags %}
          &nbsp;|&nbsp;
          {% for tag in post.tags %}
            <a href="{{ '/tags/#' | append: tag | relative_url }}" class="tag">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
          {% endfor %}
        {% endif %}
      </p>
    </li>
  {% endfor %}
</ul>
