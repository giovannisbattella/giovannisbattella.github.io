title: Giovanni Sbattella
description: My website
subtitle: Complex Macroeconomics 
url: "https://giovannisbattella.github.io"
baseurl: ""

remote_theme: mmistakes/minimal-mistakes@4.27.3

plugins:
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-tagging
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed

author:
  name   : "Giovanni Sbattella"
  avatar : "/images/giovanni.jpg"
  bio    : ""
  location: "Barcelona, ES"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:giovanni.sbattella@bse.eu"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/giovanni-sbattella-877b22245/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/giovannisbattella"
      
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:giovanni.sbattella@bse.eu"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/giovanni-sbattella-877b22245/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/giovannisbattella/"
  since: "2024"

include:
  - _pages

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive-taxonomy
    tag: archive-taxonomy
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/
  
defaults:
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: single
